# Dev compose — live reload for all services.
# Reads .env from project root automatically.
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: willbarnard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - willbarnard-postgres-dev:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./packages/backend
    command: node --watch src/index.js
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/willbarnard
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ROOT_URL: ${ROOT_URL}
      STUDIO_URL: ${STUDIO_URL}
      ADMIN_URL: ${ADMIN_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PRICE_BASIC_MONTHLY: ${PRICE_BASIC_MONTHLY}
      PRICE_BASIC_YEARLY: ${PRICE_BASIC_YEARLY}
      PRICE_PROFESSIONAL_MONTHLY: ${PRICE_PROFESSIONAL_MONTHLY}
      PRICE_PROFESSIONAL_YEARLY: ${PRICE_PROFESSIONAL_YEARLY}
      PRICE_ENTERPRISE_MONTHLY: ${PRICE_ENTERPRISE_MONTHLY}
      PRICE_ENTERPRISE_YEARLY: ${PRICE_ENTERPRISE_YEARLY}
    volumes:
      - ./packages/backend/src:/app/src
      - backend_nm:/app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  frontend-root:
    build:
      context: ./packages/frontend-root
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        EXPOSE 5173
        CMD ["npm", "run", "dev", "--", "--host"]
    environment:
      API_PROXY_TARGET: http://backend:3001
      VITE_STUDIO_URL: ${STUDIO_URL}
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./packages/frontend-root:/app
      - frontend_root_nm:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - internal

  frontend-studio:
    build:
      context: ./packages/frontend-studio
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        EXPOSE 5174
        CMD ["npm", "run", "dev", "--", "--host"]
    environment:
      API_PROXY_TARGET: http://backend:3001
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./packages/frontend-studio:/app
      - frontend_studio_nm:/app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - backend
    networks:
      - internal

  frontend-admin:
    build:
      context: ./packages/frontend-admin
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        EXPOSE 5175
        CMD ["npm", "run", "dev", "--", "--host"]
    environment:
      API_PROXY_TARGET: http://backend:3001
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./packages/frontend-admin:/app
      - frontend_admin_nm:/app/node_modules
    ports:
      - "5175:5175"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  willbarnard-postgres-dev:
  backend_nm:
  frontend_root_nm:
  frontend_studio_nm:
  frontend_admin_nm:
