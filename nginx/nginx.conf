worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    client_max_body_size 10m;

    # Beachhead's nginx-proxy handles subdomain routing externally.
    # Each frontend service is its own container — this config just serves
    # the static files it was built with and proxies /api/ to the backend.
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80 default_server;

        location /api/ {
            set $backend_upstream http://backend:3001;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
